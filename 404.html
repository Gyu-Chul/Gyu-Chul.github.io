<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found | GYUCHUL</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script>
    // Catch any /chul/* path that didn't get a static redirect file (e.g. old slug URLs)
    // and forward to the new external blog. Also catch /blog/*, /team/*, /api/*
    // (deprecated Notion-driven routes) → redirect to homepage.
    (function () {
      var path = window.location.pathname || '';
      if (path.indexOf('/chul') === 0) {
        window.location.replace('https://su9king.github.io/');
        return;
      }
      if (path.indexOf('/blog') === 0 || path.indexOf('/team') === 0 || path.indexOf('/api') === 0 || path.indexOf('/gyu/blog') === 0) {
        window.location.replace('/');
        return;
      }
    })();
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #050505;
      --white: #f0f0f0;
      --accent: #ff2d2d;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .nf-content {
      max-width: 600px;
    }

    .nf-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 20vw, 16rem);
      line-height: 0.85;
      color: var(--accent);
    }

    .nf-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.1em;
      margin: 1rem 0 1.5rem;
    }

    .nf-desc {
      font-size: 1rem;
      line-height: 1.7;
      opacity: 0.6;
      margin-bottom: 2.5rem;
    }

    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2.5rem;
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      transition: transform 0.3s;
    }

    .nf-btn:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="nf-content">
    <div class="nf-code">404</div>
    <h1 class="nf-title">PAGE NOT FOUND</h1>
    <p class="nf-desc">
      찾으시는 페이지가 존재하지 않거나 이동/삭제되었을 수 있습니다.<br>
      CHUL의 글은 <a href="https://su9king.github.io/" style="color: var(--accent);">su9king.github.io</a> 로 이전되었습니다.
    </p>
    <a href="/" class="nf-btn">
      <span>BACK TO HOME</span>
      <span>→</span>
    </a>
  </div>
</body>
</html>
